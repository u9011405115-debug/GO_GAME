name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── 版本一：無 GnuGo ────────────────────────────────────────────────────────
  build-no-gnugo:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed --name "圍棋小學堂" `
            --hidden-import tkinter --hidden-import tkinter.font `
            --hidden-import tkinter.messagebox --hidden-import tkinter.ttk `
            --noconfirm main.py
      - uses: actions/upload-artifact@v4
        with:
          name: 圍棋小學堂-Windows-無引擎
          path: dist/圍棋小學堂.exe
          retention-days: 30

  # ── 版本二：含 GnuGo ─────────────────────────────────────────────────────────
  build-with-gnugo:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install GnuGo via MSYS2 pacman
        shell: cmd
        run: C:\msys64\usr\bin\bash.exe -lc "pacman -Sy --noconfirm mingw-w64-x86_64-gnugo 2>&1"

      - name: Find gnugo.exe location
        shell: pwsh
        run: |
          Write-Host "=== Searching C:\msys64 for gnugo ==="
          Get-ChildItem -Path "C:\msys64" -Filter "*gnugo*" -Recurse -ErrorAction SilentlyContinue |
            Select-Object FullName, Length | Format-Table -AutoSize
          Write-Host "=== where gnugo ==="
          where.exe gnugo 2>&1

      - name: Copy gnugo.exe to workspace
        shell: pwsh
        run: |
          $candidates = @(
            "C:\msys64\mingw64\bin\gnugo.exe",
            "C:\msys64\usr\bin\gnugo.exe",
            "C:\msys64\mingw64\bin\gnugo",
            (where.exe gnugo 2>$null | Select-Object -First 1)
          ) | Where-Object { $_ -and (Test-Path $_) }
          if ($candidates.Count -gt 0) {
            Copy-Item $candidates[0] -Destination "gnugo.exe" -Force
            Write-Host "Copied: $($candidates[0])"
          } else {
            Write-Error "gnugo not found anywhere!"
            exit 1
          }

      - name: Build EXE with GnuGo
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed --name "圍棋小學堂-GnuGo引擎" `
            --add-binary "gnugo.exe;." `
            --hidden-import tkinter --hidden-import tkinter.font `
            --hidden-import tkinter.messagebox --hidden-import tkinter.ttk `
            --noconfirm main.py

      - uses: actions/upload-artifact@v4
        with:
          name: 圍棋小學堂-Windows-GnuGo引擎
          path: dist/圍棋小學堂-GnuGo引擎.exe
          retention-days: 30
