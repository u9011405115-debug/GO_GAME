name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── 版本一：無 GnuGo ────────────────────────────────────────────────────────
  build-no-gnugo:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed --name "圍棋小學堂" `
            --hidden-import tkinter --hidden-import tkinter.font `
            --hidden-import tkinter.messagebox --hidden-import tkinter.ttk `
            --noconfirm main.py
      - uses: actions/upload-artifact@v4
        with:
          name: 圍棋小學堂-Windows-無引擎
          path: dist/圍棋小學堂.exe
          retention-days: 30

  # ── 版本二：含 GnuGo ────────────────────────────────────────────────────────
  build-with-gnugo:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyInstaller
        run: pip install pyinstaller

      # 用 MSYS2 shell 直接安裝並複製 gnugo
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gnugo

      - name: Copy gnugo.exe from MSYS2
        shell: msys2 {0}
        run: |
          which gnugo
          cp "$(which gnugo)" "$GITHUB_WORKSPACE/gnugo.exe"
          echo "Copied gnugo.exe to workspace"

      - name: Verify gnugo.exe
        shell: pwsh
        run: |
          if (Test-Path "gnugo.exe") {
            Write-Host "gnugo.exe found, size: $((Get-Item gnugo.exe).Length) bytes"
          } else {
            Write-Error "gnugo.exe not found!"
            exit 1
          }

      - name: Build EXE with GnuGo
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed --name "圍棋小學堂-GnuGo引擎" `
            --add-binary "gnugo.exe;." `
            --hidden-import tkinter --hidden-import tkinter.font `
            --hidden-import tkinter.messagebox --hidden-import tkinter.ttk `
            --noconfirm main.py

      - uses: actions/upload-artifact@v4
        with:
          name: 圍棋小學堂-Windows-GnuGo引擎
          path: dist/圍棋小學堂-GnuGo引擎.exe
          retention-days: 30
