name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── 版本一：無 GnuGo ────────────────────────────────────────────────────────
  build-no-gnugo:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed --name "圍棋小學堂" `
            --hidden-import tkinter --hidden-import tkinter.font `
            --hidden-import tkinter.messagebox --hidden-import tkinter.ttk `
            --noconfirm main.py
      - uses: actions/upload-artifact@v4
        with:
          name: 圍棋小學堂-Windows-無引擎
          path: dist/圍棋小學堂.exe
          retention-days: 30

  # ── 版本二：含 GnuGo（MSYS2 原生編譯）──────────────────────────────────────
  build-with-gnugo:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Compile GnuGo from source in MSYS2
        shell: cmd
        run: |
          C:\msys64\usr\bin\bash.exe -lc "
            export PATH='/mingw64/bin:/usr/bin:$PATH'
            pacman -S --noconfirm make mingw-w64-x86_64-gcc wget 2>&1 | grep -E 'installed|up to date|error' || true
            cd /tmp
            wget -q https://ftp.gnu.org/gnu/gnugo/gnugo-3.8.tar.gz -O gnugo.tar.gz
            tar xzf gnugo.tar.gz
            cd gnugo-3.8
            ./configure --prefix=/tmp/gnugo_install 2>&1 | tail -2
            make -j2 2>&1 | tail -5
            ls -la interface/
            cp interface/gnugo.exe /tmp/gnugo_install/gnugo.exe
          "

      - name: Copy gnugo.exe to workspace
        shell: pwsh
        run: |
          $src = "C:\msys64\tmp\gnugo_install\gnugo.exe"
          if (Test-Path $src) {
            Copy-Item $src -Destination "gnugo.exe" -Force
            Write-Host "OK: $((Get-Item 'gnugo.exe').Length) bytes"
          } else {
            Write-Error "gnugo.exe not built at $src"
            exit 1
          }

      - name: Build EXE with GnuGo
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed --name "圍棋小學堂-GnuGo引擎" `
            --add-binary "gnugo.exe;." `
            --hidden-import tkinter --hidden-import tkinter.font `
            --hidden-import tkinter.messagebox --hidden-import tkinter.ttk `
            --noconfirm main.py

      - uses: actions/upload-artifact@v4
        with:
          name: 圍棋小學堂-Windows-GnuGo引擎
          path: dist/圍棋小學堂-GnuGo引擎.exe
          retention-days: 30
