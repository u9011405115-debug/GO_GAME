name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── 版本一：無 GnuGo ────────────────────────────────────────────────────────
  build-no-gnugo:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed --name "圍棋小學堂" `
            --hidden-import tkinter --hidden-import tkinter.font `
            --hidden-import tkinter.messagebox --hidden-import tkinter.ttk `
            --noconfirm main.py
      - uses: actions/upload-artifact@v4
        with:
          name: 圍棋小學堂-Windows-無引擎
          path: dist/圍棋小學堂.exe
          retention-days: 30

  # ── 版本二：含 GnuGo（MSYS2 原生編譯）──────────────────────────────────────
  build-with-gnugo:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Write GnuGo build script
        shell: pwsh
        run: |
          $script = @'
          export PATH='/mingw64/bin:/usr/local/bin:/usr/bin:/bin'
          set -e

          echo "=== Installing build tools ==="
          pacman -S --noconfirm --needed make mingw-w64-x86_64-gcc wget

          echo "=== Downloading GnuGo 3.8 ==="
          cd /tmp
          wget -q https://ftp.gnu.org/gnu/gnugo/gnugo-3.8.tar.gz -O gnugo.tar.gz
          tar xzf gnugo.tar.gz

          echo "=== Configuring ==="
          cd gnugo-3.8
          ./configure CC=x86_64-w64-mingw32-gcc --host=x86_64-w64-mingw32

          echo "=== Patching getopt.c ==="
          sed -i 's/extern char \*getenv ();/extern char *getenv (const char *);/' utils/getopt.c

          echo "=== Building ==="
          make -j2

          echo "=== Copying result ==="
          ls -la interface/
          cp interface/gnugo.exe /c/gnugo_built.exe
          echo "DONE: gnugo.exe built successfully"
          '@
          # Remove leading spaces from heredoc
          $lines = $script -split "`n" | ForEach-Object { $_ -replace '^\s{10}', '' }
          $lines -join "`n" | Out-File -FilePath "build_gnugo.sh" -Encoding utf8NoBOM

      - name: Compile GnuGo from source in MSYS2
        shell: cmd
        env:
          CHERE_INVOKING: "1"
        run: C:\msys64\usr\bin\bash.exe -l build_gnugo.sh

      - name: Verify and copy gnugo.exe
        shell: pwsh
        run: |
          if (Test-Path "C:\gnugo_built.exe") {
            Copy-Item "C:\gnugo_built.exe" -Destination "gnugo.exe" -Force
            Write-Host "OK: $((Get-Item 'gnugo.exe').Length) bytes"
          } else {
            Write-Error "gnugo.exe not found at C:\gnugo_built.exe"
            exit 1
          }

      - name: Build EXE with GnuGo
        shell: pwsh
        run: |
          pyinstaller --onefile --windowed --name "圍棋小學堂-GnuGo引擎" `
            --add-binary "gnugo.exe;." `
            --hidden-import tkinter --hidden-import tkinter.font `
            --hidden-import tkinter.messagebox --hidden-import tkinter.ttk `
            --noconfirm main.py

      - uses: actions/upload-artifact@v4
        with:
          name: 圍棋小學堂-Windows-GnuGo引擎
          path: dist/圍棋小學堂-GnuGo引擎.exe
          retention-days: 30
